services:
  - type: web
    name: docmind-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import CrossEncoder, SentenceTransformer; CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2'); SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
